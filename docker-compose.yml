version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sirafit-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped
    networks:
      - sirafit-network

  postgres:
    image: postgres:15-alpine
    container_name: sirafit-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=sirafit
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sirafit-network

  redis:
    image: redis:7-alpine
    container_name: sirafit-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - sirafit-network

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: sirafit-celery-worker
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - sirafit-network

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.celery
    container_name: sirafit-celery-beat
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - sirafit-network
    command: celery -A app.services.email.celery_app beat --schedule-file /tmp/celery-beat.schedule

volumes:
  postgres_data:
  redis_data:

networks:
  sirafit-network:
    driver: bridge
