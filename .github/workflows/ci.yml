name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-asyncio httpx pytest-cov

      - name: Run tests with coverage
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: ci_test_secret_key_not_for_production
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: "15"
          REFRESH_TOKEN_EXPIRE_DAYS: "7"
          SMTP_HOST: smtp.example.com
          SMTP_PORT: "587"
          SMTP_USER: test@example.com
          SMTP_PASSWORD: dummy_password
          SMTP_FROM: noreply@sirafit.com
          CORS_ORIGINS: http://localhost:3030
          ENVIRONMENT: testing
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: memory://
          CELERY_RESULT_BACKEND: cache+memory://
        run: |
          pytest tests/ -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  # ─── Backend Lint & Type Check ────────────────────────────────────────────────
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install lint dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt ruff mypy

      - name: Run Ruff (lint)
        run: ruff check app/ tests/

      - name: Run Ruff (format check)
        run: ruff format --check app/ tests/

      - name: Run MyPy (type check)
        # The backend is not yet fully type-annotated, so MyPy reports many
        # errors. Keep it visible but non-blocking until the code is annotated.
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports --no-error-summary

  # ─── Frontend Lint & Type Check ───────────────────────────────────────────────
  frontend-check:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npx tsc --noEmit

      - name: Run Prettier format check
        run: npx prettier --check .

  # ─── Frontend Build ───────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    needs: frontend-check
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ─── Backend Docker Build ─────────────────────────────────────────────────────
  backend-docker:
    name: Backend — Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Celery Worker Docker Build ───────────────────────────────────────────────
  celery-docker:
    name: Celery Worker — Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, backend-lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Celery Worker
        id: meta-celery
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-celery-worker
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Celery Worker Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.celery
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-celery.outputs.tags }}
          labels: ${{ steps.meta-celery.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Frontend Docker Build ────────────────────────────────────────────────────
  frontend-docker:
    name: Frontend — Docker Build
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Integration Tests with Docker Compose ────────────────────────────────────
  integration-test:
    name: Integration Tests — Docker Compose
    runs-on: ubuntu-latest
    needs: [backend-docker, frontend-docker]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create test environment file
        run: |
          cat > backend/.env.test << EOF
          DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sirafit_test
          SECRET_KEY=test_secret_key_for_integration_tests_only
          ALGORITHM=HS256
          ACCESS_TOKEN_EXPIRE_MINUTES=15
          REFRESH_TOKEN_EXPIRE_DAYS=7
          SMTP_HOST=smtp.example.com
          SMTP_PORT=587
          SMTP_USER=test@example.com
          SMTP_PASSWORD=dummy_password
          SMTP_FROM=noreply@sirafit.com
          CORS_ORIGINS=http://localhost:3031
          ENVIRONMENT=testing
          REDIS_URL=redis://redis:6379/0
          CELERY_BROKER_URL=redis://redis:6379/0
          CELERY_RESULT_BACKEND=redis://redis:6379/0
          POSTGRES_USER=postgres
          POSTGRES_PASSWORD=postgres
          POSTGRES_DB=sirafit_test
          EOF

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build

      - name: Wait for services to be healthy
        run: |
          sleep 30
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps

      - name: Run backend integration tests
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T backend pytest tests/ -v --tb=short -k "integration"

      - name: Run frontend E2E tests against integration environment
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml exec -T frontend npm run test:e2e:ci

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs --tail=100

      - name: Clean up
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  # ─── Security Scan ────────────────────────────────────────────────────────────
  security-scan:
    name: Security — Trivy Scan
    runs-on: ubuntu-latest
    needs: [backend-docker, celery-docker, frontend-docker]
    # Images are only pushed on non-PR events, so scanning must run on push only.
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-backend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'image'
          scan-ref: '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-frontend.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-backend.sarif'
          category: 'backend'

      - name: Upload Trivy results to GitHub Security (Frontend)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-frontend.sarif'
          category: 'frontend'

  # ─── Deploy to Staging ────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/develop'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          echo "Deploying to staging environment..."
          # Add your staging deployment commands here
          # Example: kubectl apply -f k8s/staging/
          # Or: docker compose -f docker-compose.staging.yml up -d

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # Add smoke test commands here

  # ─── Deploy to Production ─────────────────────────────────────────────────────
  deploy-production:
    name: Deploy — Production
    runs-on: ubuntu-latest
    needs: [integration-test, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Production
        run: |
          echo "Deploying to production environment..."
          # Add your production deployment commands here
          # Example: kubectl apply -f k8s/production/
          # Or: docker compose -f docker-compose.prod.yml up -d

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against production..."
          # Add smoke test commands here

      - name: Notify on success
        if: success()
        run: |
          echo "Deployment successful! Notifying team..."
          # Add notification logic (Slack, Discord, email, etc.)

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment failed! Notifying team..."
          # Add notification logic

  # ─── Dependency Review ────────────────────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Review dependencies
        uses: actions/dependency-review-action@v4
        with:
          config-file: '.github/dependency-review-config.yml'
          fail-on-severity: high

  # ─── Summary ──────────────────────────────────────────────────────────────────
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs:
      - backend-test
      - backend-lint
      - frontend-check
      - frontend-build
      - backend-docker
      - celery-docker
      - frontend-docker
      - integration-test
      - security-scan
      - dependency-review
    if: always()
    steps:
      - name: Check job statuses
        run: |
          echo "Backend Test: ${{ needs.backend-test.result }}"
          echo "Backend Lint: ${{ needs.backend-lint.result }}"
          echo "Frontend Check: ${{ needs.frontend-check.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Backend Docker: ${{ needs.backend-docker.result }}"
          echo "Celery Docker: ${{ needs.celery-docker.result }}"
          echo "Frontend Docker: ${{ needs.frontend-docker.result }}"
          echo "Integration Test: ${{ needs.integration-test.result }}"
          echo "Security Scan: ${{ needs.security-scan.result }}"
          echo "Dependency Review: ${{ needs.dependency-review.result }}"

      - name: Fail if any required job failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
