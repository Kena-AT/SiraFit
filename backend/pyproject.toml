[tool.pytest.ini_options]
# Tests live in the repo-root `tests/` directory (relocated from backend/tests).
# `pythonpath = ["."]` keeps `import app` working when pytest is run from
# `./backend` (as CI does), and `testpaths` points at the relocated suite.
pythonpath = ["."]
testpaths = ["../tests"]
asyncio_mode = "auto"
